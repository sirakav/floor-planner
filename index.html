<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floor Plan Editor – Visual Designer</title>
  <meta name="description"
    content="Visual drag-and-drop floor plan editor with predefined elements and JSON import/export." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="editor-app">
    <!-- Top toolbar -->
    <header id="editor-toolbar">
      <div class="toolbar-left">
        <a href="/" class="toolbar-brand" title="Back to Viewer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          <span>Floor Plan <strong>Editor</strong></span>
        </a>
      </div>
      <div class="toolbar-centre">
        <button id="btn-undo" class="tool-btn" title="Undo (Ctrl+Z)">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 10h13a4 4 0 0 1 0 8H9" />
            <polyline points="7 6 3 10 7 14" />
          </svg>
          Undo
        </button>
        <button id="btn-redo" class="tool-btn" title="Redo (Ctrl+Y)">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 10H8a4 4 0 0 0 0 8h6" />
            <polyline points="17 6 21 10 17 14" />
          </svg>
          Redo
        </button>
        <div class="toolbar-sep"></div>
        <button id="btn-grid" class="tool-btn active" title="Toggle Grid">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
          </svg>
          Grid
        </button>
        <button id="btn-snap" class="tool-btn active" title="Toggle Snap">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 3L3 21" />
            <path d="M21 12l-3-3m0 6l3-3" />
            <path d="M3 12l3-3m0 6l-3-3" />
          </svg>
          Snap
        </button>
        <div class="toolbar-sep"></div>
        <button id="btn-floor" class="tool-btn active" title="Toggle Floor Fill">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" stroke="none">
            <rect x="3" y="3" width="18" height="18" rx="2" opacity="0.3" />
            <rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
          </svg>
          Floor
        </button>
        <label class="tool-btn floor-color-wrap" title="Floor Colour">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2a10 10 0 1 0 10 10" />
            <circle cx="19" cy="5" r="3" fill="currentColor" stroke="none" />
          </svg>
          <input type="color" id="floor-color-input" value="#f5f0e8" title="Floor Colour" />
        </label>
        <div class="toolbar-sep"></div>
        <button id="btn-delete" class="tool-btn danger" title="Delete Selected (Del)">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6" />
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
            <path d="M10 11v6" />
            <path d="M14 11v6" />
            <path d="M9 6V3h6v3" />
          </svg>
          Delete
        </button>
      </div>
      <div class="toolbar-right">
        <button id="btn-import" class="tool-btn">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
          Import
        </button>
        <button id="btn-export" class="tool-btn accent">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          Export JSON
        </button>
      </div>
    </header>

    <!-- Left sidebar: Element Palette -->
    <aside id="palette">
      <h2>Elements</h2>

      <div class="palette-group">
        <h3>Structural</h3>
        <div class="palette-items" id="palette-structural"></div>
      </div>

      <div class="palette-group">
        <h3>Furniture</h3>
        <div class="palette-items" id="palette-furniture"></div>
      </div>

      <div class="palette-group">
        <h3>Fixtures</h3>
        <div class="palette-items" id="palette-fixtures"></div>
      </div>

      <div class="palette-group">
        <h3>Other</h3>
        <div class="palette-items" id="palette-other"></div>
      </div>
    </aside>

    <!-- Canvas area -->
    <main id="canvas-area">
      <canvas id="editor-canvas"></canvas>
      <div id="canvas-coords">0, 0</div>
    </main>

    <!-- Right panel: Properties -->
    <aside id="properties-panel">
      <h2>Properties</h2>
      <div id="props-empty" class="props-empty">
        <p>Select an element to<br>view its properties</p>
      </div>
      <div id="props-form" class="props-form" style="display:none;">
        <div class="prop-row">
          <label>Type</label>
          <span id="prop-type"></span>
        </div>
        <div class="prop-row">
          <label>X (m)</label>
          <input type="number" id="prop-x" step="0.05" />
        </div>
        <div class="prop-row">
          <label>Y (m)</label>
          <input type="number" id="prop-y" step="0.05" />
        </div>
        <div class="prop-row">
          <label>Width (m)</label>
          <input type="number" id="prop-w" step="0.05" min="0.1" />
        </div>
        <div class="prop-row">
          <label>Height (m)</label>
          <input type="number" id="prop-h" step="0.05" min="0.1" />
        </div>
        <div class="prop-row">
          <label>Rotation (°)</label>
          <input type="number" id="prop-rot" step="15" />
        </div>
        <div class="prop-row">
          <label>Colour</label>
          <input type="color" id="prop-color" />
        </div>
        <div class="prop-row">
          <label>Label</label>
          <input type="text" id="prop-label" placeholder="Optional label" />
        </div>
      </div>
    </aside>
  </div>

  <input type="file" id="file-import" accept=".json" style="display:none" />
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
